name: Bug report
description: Something is broken or behaves unexpectedly
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open /problem/two-sum
        2. Step to the end
        3. ...
    validations:
      required: true

  - type: input
    id: problem
    attributes:
      label: Which problem/page?
      placeholder: e.g. two-sum, or the /learn map

  - type: dropdown
    id: where
    attributes:
      label: Where did you see this?
      options:
        - The live demo (stepwise-beta.vercel.app)
        - Running locally
        - Both
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Screenshots / console errors
      description: A screenshot of a wrong visualization is worth a lot here.
